<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HBnB - Login</title>
  <link rel="icon" href="assets/images/icon.png" type="image/png">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <header>
    <a href="index.html" aria-label="HBnB Home">
      <img src="assets/images/logo.png" alt="HBnB logo" class="logo">
    </a>
    <a href="login.html" class="login-button" aria-current="page">Login</a>
  </header>

  <nav aria-label="Main navigation">
    <ul>
      <li><a href="index.html">Places</a></li>
      <li><a href="login.html" aria-current="page">Login</a></li>
    </ul>
  </nav>

  <main>
    <section class="auth-section">
      <h1>Login</h1>
      <form class="form" action="#" method="post" novalidate>
        <div class="form-row">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" required autocomplete="email">
        </div>

        <div class="form-row">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" required autocomplete="current-password">
        </div>

        <button type="submit" class="details-button">Sign In</button>
      </form>
    </section>
  </main>

  <footer>
    <p>All rights reserved.</p>
  </footer>
</body>
</html>
