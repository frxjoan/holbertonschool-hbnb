<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HBnB - Places</title>
  <link rel="icon" href="assets/images/logo.png" type="image/png">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <header>
    <a href="index.html" aria-label="HBnB Home">
      <img src="assets/images/logo.png" alt="HBnB logo" class="logo">
    </a>
    <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">🌙 Dark</button>
    <div class="header-actions">
      <a href="login.html" class="login-button auth-login-link">Sign In</a>
      <a href="login.html#signup-section" class="login-button auth-signin-link">Sign Up</a>
      <a href="profile.html" class="auth-user-name auth-profile-link" style="display: none;"></a>
      <a href="#" class="login-button auth-logout-link" style="display: none;">Logout</a>
    </div>
  </header>

  <nav aria-label="Main navigation">
    <ul>
      <li><a href="index.html" aria-current="page">Places</a></li>
      <li><a href="login.html" class="auth-login-link" id="login-link">Sign In</a></li>
      <li><a href="login.html#signup-section" class="auth-signin-link">Sign Up</a></li>
      <li><a href="create_place.html" class="auth-create-place-link" style="display: none;">Create Place</a></li>
      <li><a href="profile.html" class="auth-profile-link" style="display: none;">Profile</a></li>
      <li><a href="#" class="auth-logout-link" style="display: none;">Logout</a></li>
    </ul>
  </nav>

  <main>
    <section class="page-intro">
      <h1>Explore Places</h1>
      <p>Find your next stay from our curated listings.</p>
    </section>

    <section class="filters" aria-label="Filter places">
      <label for="price-filter">Price Range</label>
      <select id="price-filter" name="price">
        <option value="all">All</option>
        <option value="10">10</option>
        <option value="50">50</option>
        <option value="100">100</option>
      </select>
    </section>

    <section id="places-list" aria-label="Places list" class="places-grid"></section>
  </main>

  <footer>
    <p>All rights reserved.</p>
  </footer>
  <script src="assets/js/scripts.js"></script>
  <script src="assets/js/auth-ui.js"></script>
</body>
</html>
