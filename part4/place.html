<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HBnB - Place Details</title>
  <link rel="icon" href="assets/images/icon.png" type="image/png">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <header>
    <a href="index.html" aria-label="HBnB Home">
      <img src="assets/images/logo.png" alt="HBnB logo" class="logo">
    </a>
    <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">🌙 Dark</button>
    <div class="header-actions">
      <a href="login.html" class="login-button auth-login-link">Sign In</a>
      <a href="login.html#signup-section" class="login-button auth-signin-link">Sign Up</a>
      <a href="profile.html" class="auth-user-name auth-profile-link" style="display: none;"></a>
      <a href="#" class="login-button auth-logout-link" style="display: none;">Logout</a>
    </div>
  </header>

  <nav aria-label="Main navigation">
    <ul>
      <li><a href="index.html">Places</a></li>
      <li><a href="login.html" class="auth-login-link">Sign In</a></li>
      <li><a href="login.html#signup-section" class="auth-signin-link">Sign Up</a></li>
      <li><a href="create_place.html" class="auth-create-place-link" style="display: none;">Create Place</a></li>
      <li><a href="profile.html" class="auth-profile-link" style="display: none;">Profile</a></li>
      <li><a href="#" class="auth-logout-link" style="display: none;">Logout</a></li>
    </ul>
  </nav>

  <main>
    <article class="place-details" id="place-details">
      <h1 id="place-title">Place details</h1>

      <div class="place-info">
        <h2>Host</h2>
        <p id="place-host">Loading...</p>
      </div>

      <div class="place-info">
        <h2>Price</h2>
        <p id="place-price">Loading...</p>
      </div>

      <div class="place-info">
        <h2>Description</h2>
        <p id="place-description">Loading...</p>
      </div>

      <div class="place-info">
        <h2>Amenities</h2>
        <ul id="place-amenities"></ul>
      </div>
    </article>

    <section aria-label="Reviews">
      <h2>Reviews</h2>
      <div id="reviews-list"></div>
    </section>

    <section class="add-review" aria-label="Add review access">
      <a href="add_review.html" class="details-button" id="add-review-link">Add Review</a>
    </section>
  </main>

  <footer>
    <p>All rights reserved.</p>
  </footer>
  <script src="assets/js/scripts.js"></script>
  <script src="assets/js/auth-ui.js"></script>
  <script src="assets/js/review-actions.js"></script>
</body>
</html>
