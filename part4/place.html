<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HBnB - Place Details</title>
  <link rel="icon" href="assets/images/icon.png" type="image/png">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <header>
    <a href="index.html" aria-label="HBnB Home">
      <img src="assets/images/logo.png" alt="HBnB logo" class="logo">
    </a>
    <a href="login.html" class="login-button auth-login-link">Login</a>
  </header>

  <nav aria-label="Main navigation">
    <ul>
      <li><a href="index.html">Places</a></li>
      <li><a href="login.html" class="auth-login-link">Login</a></li>
    </ul>
  </nav>

  <main>
    <article class="place-details" id="place-details">
      <h1 id="place-title">Place details</h1>

      <div class="place-info">
        <h2>Host</h2>
        <p id="place-host">Loading...</p>
      </div>

      <div class="place-info">
        <h2>Price</h2>
        <p id="place-price">Loading...</p>
      </div>

      <div class="place-info">
        <h2>Description</h2>
        <p id="place-description">Loading...</p>
      </div>

      <div class="place-info">
        <h2>Amenities</h2>
        <ul id="place-amenities"></ul>
      </div>
    </article>

    <section aria-label="Reviews">
      <h2>Reviews</h2>
      <div id="reviews-list"></div>
    </section>

    <section class="add-review" aria-label="Add review access">
      <a href="add_review.html" class="details-button" id="add-review-link">Add Review</a>
    </section>
  </main>

  <footer>
    <p>All rights reserved.</p>
  </footer>
  <script src="assets/js/scripts.js"></script>
</body>
</html>
